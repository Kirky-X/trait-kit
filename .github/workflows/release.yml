# Rust Release：tag (v*) 触发 → 多平台构建 → GitHub Release → 条件发布 crates.io
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # 创建 GitHub Release

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: macos-latest, target: x86_64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          STAGE=target/release-stage
          mkdir -p "$STAGE"
          cp "target/${{ matrix.target }}/release/${{ github.event.repository.name }}" "$STAGE/" 2>/dev/null || true
          cp README.md LICENSE* "$STAGE/" 2>/dev/null || true
          tar czf "${{ github.event.repository.name }}-${{ matrix.target }}.tar.gz" -C "$STAGE" .

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          STAGE=target/release-stage
          mkdir -p "$STAGE"
          cp "target/${{ matrix.target }}/release/${{ github.event.repository.name }}.exe" "$STAGE/" 2>/dev/null || true
          cp README.md LICENSE* "$STAGE/" 2>/dev/null || true
          7z a "${{ github.event.repository.name }}-${{ matrix.target }}.zip" "$STAGE"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            *.tar.gz
            *.zip

  github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*

  # 仅当配置了 CARGO_REGISTRY_TOKEN 才发布到 crates.io；否则跳过，不报错。
  publish-crates:
    name: Publish to crates.io (条件)
    needs: github-release
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    if: ${{ env.CARGO_REGISTRY_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo publish
        run: cargo publish --locked --token "${CARGO_REGISTRY_TOKEN}"
